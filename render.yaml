services:
  - type: web
    name: quantumcircuitsimulator
    runtime: node
    buildCommand: |
      npm install
      python3 -m venv simulators/color/venv
      simulators/color/venv/bin/pip install -r simulators/color/requirements.txt
    startCommand: node app.js
    envVars:
      - key: PORT
        value: 3000
